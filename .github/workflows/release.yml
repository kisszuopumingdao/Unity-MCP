name: release

on:
  push:
    branches:
      - main

jobs:
  test-cli:
    uses: ./.github/workflows/test_cli.yml

  check-version-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.current-version }}
      prev_tag: ${{ steps.prev_tag.outputs.tag }}
      tag_exists: ${{ steps.tag_exists.outputs.exists }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get version from package.json
        id: get_version
        uses: martinbeentjes/npm-get-version-action@v1.3.1
        with:
          path: Unity-MCP-Plugin/Packages/com.ivanmurzak.unity.mcp

      - name: Find previous version tag
        id: prev_tag
        uses: WyriHaximus/github-action-get-previous-tag@v2

      - name: Check if tag exists
        id: tag_exists
        uses: mukunku/tag-exists-action@v1.7.0
        with:
          tag: ${{ steps.get_version.outputs.current-version }}

  # Generates release notes (release.md) in parallel with tests/builds.
  # The artifact is consumed by release-unity-plugin's atomic publish step.
  prepare-release-notes:
    runs-on: ubuntu-latest
    needs: [check-version-tag]
    if: needs.check-version-tag.outputs.tag_exists == 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Generate release description
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          version=${{ needs.check-version-tag.outputs.version }}
          prev_tag=${{ needs.check-version-tag.outputs.prev_tag }}
          repo_url="https://github.com/${GITHUB_REPOSITORY}"
          today=$(date +'%B %e, %Y')

          echo "repo_url: $repo_url"
          echo "today: $today"

          echo "# AI Game Developer (Unity MCP) $version" > release.md
          echo "**Released:** *$today*" >> release.md

          echo "" >> release.md
          echo "---" >> release.md
          echo "" >> release.md

          if [ -n "$prev_tag" ]; then
            echo "## Comparison" >> release.md
            echo "See every change: [Compare $prev_tag...$version]($repo_url/compare/$prev_tag...$version)" >> release.md

            echo "" >> release.md
            echo "---" >> release.md
            echo "" >> release.md

            echo "## Commit Summary (Newest → Oldest)" >> release.md
            for sha in $(git log --pretty=format:'%H' $prev_tag..HEAD); do
              username=$(gh api repos/${GITHUB_REPOSITORY}/commits/$sha --jq '.author.login // .commit.author.name' 2>/dev/null || true)
              if [ -z "$username" ]; then
                username=$(git log -1 --pretty=format:'%an' $sha)
              fi
              message=$(git log -1 --pretty=format:'%s' $sha)
              short_sha=$(git log -1 --pretty=format:'%h' $sha)
              echo "- [\`$short_sha\`]($repo_url/commit/$sha) — $message by @$username" >> release.md
            done
          fi

      - name: Upload release notes as artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-notes
          path: ./release.md

  build-unity-installer:
    runs-on: ubuntu-latest
    needs: [check-version-tag]
    if: needs.check-version-tag.outputs.tag_exists == 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Activate Unity license
        id: activate
        uses: ./.github/actions/unity/activate-license
        with:
          unityVersion: "2022.3.62f3"
          unity-email: ${{ secrets.UNITY_EMAIL }}
          unity-password: ${{ secrets.UNITY_PASSWORD }}

      - name: Decode Unity license
        run: |
          echo "$LICENSE_B64" | base64 -d > /tmp/unity_license.ulf
          DELIM="UNITY_LIC_EOF_$(openssl rand -hex 16)"
          echo "UNITY_LICENSE<<$DELIM" >> "$GITHUB_ENV"
          cat /tmp/unity_license.ulf >> "$GITHUB_ENV"
          printf '\n%s\n' "$DELIM" >> "$GITHUB_ENV"
        env:
          LICENSE_B64: ${{ steps.activate.outputs.license }}
        shell: bash

      - name: Cache Unity Library
        uses: actions/cache@v5
        with:
          path: ./Installer/Library
          key: Library-Unity-Installer

      - name: Test Unity Installer (EditMode)
        uses: game-ci/unity-test-runner@08fd329f00a18efa297140b14ac28ebce742759e # node24 runtime (PR #304); revert to @v4 once game-ci moves the tag
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          projectPath: ./Installer
          unityVersion: 2022.3.62f3
          customImage: "unityci/editor:ubuntu-2022.3.62f3-base-3"
          testMode: editmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: Unity Installer EditMode Test Results
          artifactsPath: artifacts-installer-editmode
          customParameters: -CI true -GITHUB_ACTIONS true

      - name: Clean Unity artifacts and reset git state
        run: |
          # Force remove Unity generated files with restricted permissions
          sudo rm -rf ./Installer/Logs/ || true
          sudo rm -rf ./Installer/Temp/ || true
          sudo rm -rf ./artifacts-installer-editmode/ || true

          # Reset tracked files to their committed state...
          git reset --hard HEAD
          # ...and remove untracked Unity junk (e.g. batch-mode error.html/error.png)
          # that would otherwise leave the tree dirty. -d removes stray dirs; we do NOT
          # pass -x, so gitignored caches like ./Installer/Library are preserved.
          git clean -fd
          echo "Cleaned Unity artifacts and reset git state"
          git status --porcelain

      - name: Export Unity Package
        uses: game-ci/unity-builder@v5
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ./Installer
          unityVersion: 2022.3.62f3
          customImage: "unityci/editor:ubuntu-2022.3.62f3-base-3"
          buildName: AI-Game-Dev-Installer
          buildsPath: build
          buildMethod: com.IvanMurzak.Unity.MCP.Installer.PackageExporter.ExportPackage
          customParameters: -CI true -GITHUB_ACTIONS true
          # This job only exports a .unitypackage; it never reads Application.version.
          # Default Semantic versioning runs a git-dirty check that fails when Unity
          # leaves stray untracked files behind, so disable versioning entirely.
          versioning: None

      - name: Upload Unity Package as artifact
        uses: actions/upload-artifact@v6
        with:
          name: unity-installer-package
          path: ./Installer/build/AI-Game-Dev-Installer.unitypackage

  # NOTE: the MCP server is no longer built or released from this repo — the plugin consumes
  # the shared GameDev-MCP-Server (https://github.com/IvanMurzak/GameDev-MCP-Server) release
  # pinned by McpServerManager.ServerVersion.

  # Builds the signed UPM package (.tgz with package/.attestation.p7m) in parallel
  # with tests/builds and uploads it as a `signed-upm-package` artifact for the
  # atomic release publish in release-unity-plugin.
  #
  # HARD-GATE: this job is NOT continue-on-error. Missing UPM signing secrets fail
  # fast and the release pipeline halts — no GitHub Release is created without a
  # signed UPM tarball. This reverses PR #776's soft-fail design (see
  # docs/openupm-signing.md for the blocking-semantics rationale).
  #
  # Required repo secrets (configure via `gh secret set --repo IvanMurzak/Unity-MCP <NAME>`):
  #   - UPM_SERVICE_ACCOUNT_KEY_ID
  #   - UPM_SERVICE_ACCOUNT_KEY_SECRET
  #   - UPM_ORG_ID
  # See https://openupm.com/docs/signing-upm-packages.html for the procedure.
  build-signed-upm-package:
    runs-on: ubuntu-latest
    needs: [check-version-tag]
    if: needs.check-version-tag.outputs.tag_exists == 'false'
    env:
      UPM_SERVICE_ACCOUNT_KEY_ID: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_ID }}
      UPM_SERVICE_ACCOUNT_KEY_SECRET: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_SECRET }}
      UPM_ORG_ID: ${{ secrets.UPM_ORG_ID }}
      PACKAGE_DIR: Unity-MCP-Plugin/Packages/com.ivanmurzak.unity.mcp
      DIST_DIR: /tmp/signed-upm-dist
    steps:
      - name: Verify signing secrets are configured
        run: |
          missing=()
          [ -z "$UPM_SERVICE_ACCOUNT_KEY_ID" ]     && missing+=("UPM_SERVICE_ACCOUNT_KEY_ID")
          [ -z "$UPM_SERVICE_ACCOUNT_KEY_SECRET" ] && missing+=("UPM_SERVICE_ACCOUNT_KEY_SECRET")
          [ -z "$UPM_ORG_ID" ]                     && missing+=("UPM_ORG_ID")
          if [ "${#missing[@]}" -ne 0 ]; then
            printf '::error::UPM signing secrets are not configured (%s). The release pipeline is hard-gated on signing — see docs/openupm-signing.md for setup.\n' "${missing[*]}"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log package metadata
        run: |
          package_name="$(jq -r '.name' "$PACKAGE_DIR/package.json")"
          package_version="$(jq -r '.version' "$PACKAGE_DIR/package.json")"

          printf 'Package name: %s\n' "$package_name"
          printf 'Package version: %s\n' "$package_version"

      - name: Install Unity UPM CLI
        run: |
          curl -fsSL https://cdn.packages.unity.com/upm-cli/install.sh -o install.sh
          bash install.sh
          echo "$HOME/.upm/bin" >> "$GITHUB_PATH"

      - name: Verify Unity UPM CLI
        run: upm --help

      - name: Sign package
        run: |
          mkdir -p "$DIST_DIR"
          upm pack "./$PACKAGE_DIR" --organization-id "$UPM_ORG_ID" --destination "$DIST_DIR"

      - name: Verify signed package contains attestation
        run: |
          shopt -s nullglob
          archives=("$DIST_DIR"/*.tgz "$DIST_DIR"/*.tar.gz)
          if [ "${#archives[@]}" -ne 1 ]; then
            printf 'Expected exactly one signed package archive, found %s: %s\n' "${#archives[@]}" "${archives[*]:-<none>}" >&2
            exit 1
          fi

          archive="${archives[0]}"
          archive_basename="$(basename "$archive")"
          # OpenUPM consumes the asset via the `githubReleaseAssetName: 'com.ivanmurzak.unity.mcp-'`
          # prefix documented in docs/openupm-signing.md. Enforce the contract here so a future
          # `upm pack` naming change fails CI loudly instead of silently breaking OpenUPM pickup.
          if [[ "$archive_basename" != com.ivanmurzak.unity.mcp-* ]]; then
            printf 'Signed archive basename %q does not begin with the OpenUPM-expected prefix com.ivanmurzak.unity.mcp- (see docs/openupm-signing.md)\n' "$archive_basename" >&2
            exit 1
          fi

          archive_entries="$(tar -tzf "$archive")"
          grep -qx 'package/package.json'      <<<"$archive_entries"
          grep -qx 'package/.attestation.p7m'  <<<"$archive_entries"

          printf 'Signed archive: %s\n' "$archive_basename"
          tar -xOzf "$archive" package/package.json | jq '{name, version}'

      - name: Upload signed UPM package as artifact
        uses: actions/upload-artifact@v6
        with:
          name: signed-upm-package
          path: /tmp/signed-upm-dist/*.tgz

  # --- UNITY TESTS ---
  # -------------------

  # --- EDIT MODE ---

  test-unity-2022-3-62f3-editmode:
    needs: [build-unity-installer]
    uses: ./.github/workflows/test_unity_plugin.yml
    with:
      projectPath: "./Unity-Tests/2022.3.62f3"
      unityVersion: "2022.3.62f3"
      testMode: "editmode"
    secrets: inherit

  test-unity-2023-2-22f1-editmode:
    needs: [build-unity-installer]
    uses: ./.github/workflows/test_unity_plugin.yml
    with:
      projectPath: "./Unity-Tests/2023.2.22f1"
      unityVersion: "2023.2.22f1"
      testMode: "editmode"
    secrets: inherit

  test-unity-6000-3-1f1-editmode:
    needs: [build-unity-installer]
    uses: ./.github/workflows/test_unity_plugin.yml
    with:
      projectPath: "./Unity-Tests/6000.3.1f1"
      unityVersion: "6000.3.1f1"
      testMode: "editmode"
    secrets: inherit

  # --- PLAY MODE ---

  # test-unity-2022-3-62f3-playmode:
  #   needs: [build-unity-installer]
  #   uses: ./.github/workflows/test_unity_plugin.yml
  #   with:
  #     projectPath: './Unity-Tests/2022.3.62f3'
  #     unityVersion: '2022.3.62f3'
  #     testMode: 'playmode'
  #   secrets: inherit

  # test-unity-2023-2-22f1-playmode:
  #   needs: [build-unity-installer]
  #   uses: ./.github/workflows/test_unity_plugin.yml
  #   with:
  #     projectPath: './Unity-Tests/2023.2.22f1'
  #     unityVersion: '2023.2.22f1'
  #     testMode: 'playmode'
  #   secrets: inherit

  # test-unity-6000-3-1f1-playmode:
  #   needs: [build-unity-installer]
  #   uses: ./.github/workflows/test_unity_plugin.yml
  #   with:
  #     projectPath: './Unity-Tests/6000.3.1f1'
  #     unityVersion: '6000.3.1f1'
  #     testMode: 'playmode'
  #   secrets: inherit

  # --- STANDALONE ---

  test-unity-2022-3-62f3-standalone:
    needs: [build-unity-installer]
    uses: ./.github/workflows/test_unity_plugin.yml
    with:
      projectPath: "./Unity-Tests/2022.3.62f3"
      unityVersion: "2022.3.62f3"
      testMode: "standalone"
    secrets: inherit

  test-unity-2023-2-22f1-standalone:
    needs: [build-unity-installer]
    uses: ./.github/workflows/test_unity_plugin.yml
    with:
      projectPath: "./Unity-Tests/2023.2.22f1"
      unityVersion: "2023.2.22f1"
      testMode: "standalone"
    secrets: inherit

  test-unity-6000-3-1f1-standalone:
    needs: [build-unity-installer]
    uses: ./.github/workflows/test_unity_plugin.yml
    with:
      projectPath: "./Unity-Tests/6000.3.1f1"
      unityVersion: "6000.3.1f1"
      testMode: "standalone"
    secrets: inherit

  # -------------------

  # Atomic publish point — gated on EVERY prerequisite (tests, builds, signed
  # UPM package, release notes). Downloads all asset artifacts and creates the
  # GitHub Release + tag with the full asset set in a SINGLE
  # softprops/action-gh-release@v2 call so a failed upload cannot strand the
  # release with incomplete assets. Signing failure → no release (hard gate).
  release-unity-plugin:
    runs-on: ubuntu-latest
    needs: [
        check-version-tag,
        test-cli,
        prepare-release-notes,
        build-unity-installer,
        build-signed-upm-package,
        test-unity-2022-3-62f3-editmode,
        # test-unity-2022-3-62f3-playmode,
        test-unity-2022-3-62f3-standalone,
        test-unity-2023-2-22f1-editmode,
        # test-unity-2023-2-22f1-playmode,
        test-unity-2023-2-22f1-standalone,
        test-unity-6000-3-1f1-editmode,
        # test-unity-6000-3-1f1-playmode,
        test-unity-6000-3-1f1-standalone,
      ]
    if: needs.check-version-tag.outputs.tag_exists == 'false'
    outputs:
      version: ${{ needs.check-version-tag.outputs.version }}
      success: ${{ steps.mark_success.outputs.success }}
      release_notes: ${{ steps.read_notes.outputs.release_body }}
    steps:
      - name: Download release notes artifact
        uses: actions/download-artifact@v6
        with:
          name: release-notes
          path: ./release-notes

      - name: Download Unity installer artifact
        uses: actions/download-artifact@v6
        with:
          name: unity-installer-package
          path: ./assets

      - name: Download signed UPM package artifact
        uses: actions/download-artifact@v6
        with:
          name: signed-upm-package
          path: ./assets

      - name: List assembled release assets
        run: |
          set -e
          echo "Release notes:"
          ls -la ./release-notes
          echo ""
          echo "Release assets:"
          ls -la ./assets

      - name: Read release notes into job output
        id: read_notes
        run: |
          set -e
          # Expose the release notes body as a job output so downstream jobs
          # (publish_discord) can consume it without re-downloading the artifact.
          # Use a randomized delimiter so a release-notes line that happens to
          # match the sentinel cannot terminate the heredoc early (mirrors the
          # UNITY_LICENSE pattern above).
          DELIM="ENDOFRELEASEBODY_$(openssl rand -hex 16)"
          {
            printf 'release_body<<%s\n' "$DELIM"
            cat ./release-notes/release.md
            printf '\n%s\n' "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Create Tag and Release with all assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version-tag.outputs.version }}
          name: ${{ needs.check-version-tag.outputs.version }}
          body_path: ./release-notes/release.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            ./assets/AI-Game-Dev-Installer.unitypackage
            ./assets/com.ivanmurzak.unity.mcp-*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark publish success
        id: mark_success
        run: |
          # The action-gh-release step above is the atomic publish — if it
          # succeeded the release exists with every asset attached. Surface
          # `success=true` for downstream jobs that gate on the release.
          echo "success=true" >> "$GITHUB_OUTPUT"

  publish_discord:
    runs-on: ubuntu-latest
    needs:
      [
        release-unity-plugin,
        deploy,
      ]
    if: |
      always() &&
      needs.release-unity-plugin.result == 'success'
    steps:
      - name: Send Release Notes to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_RELEASE_NOTES_WEBHOOK }}
          RELEASE_NOTES: ${{ needs.release-unity-plugin.outputs.release_notes }}
          VERSION: ${{ needs.release-unity-plugin.outputs.version }}
        run: |
          # Get the release notes from environment variables
          # (Using env vars avoids shell quoting issues with apostrophes in commit messages)
          release_notes="$RELEASE_NOTES"
          version="$VERSION"

          # Convert usernames to GitHub profile links
          # Convert "by @username" to "by [@username](https://github.com/username)"
          release_notes_with_links=$(echo "$release_notes" | sed -E 's/by @([A-Za-z0-9_-]+)/by [@\1](https:\/\/github.com\/\1)/g')

          # Remove horizontal separators (---) and clean up extra blank lines
          # 1. Remove lines containing only --- and whitespace
          # 2. Remove lines that contain only whitespace
          # 3. Compress multiple consecutive empty lines into one
          release_notes_cleaned=$(echo "$release_notes_with_links" | \
            sed '/^[[:space:]]*---[[:space:]]*$/d' | \
            sed 's/^[[:space:]]*$//' | \
            sed '/^$/N;/^\n$/d')

          # Create the release URL
          release_url="https://github.com/${{ github.repository }}/releases/tag/${version}"

          # Append the release link to the notes
          full_message="${release_notes_cleaned}"$'\n\n'"📦 **[View Full Release](${release_url})**"

          # Discord has a 2000 character limit, so we'll truncate if needed
          if [ ${#full_message} -gt 2000 ]; then
            # Remove lines from the end until it fits, keeping the link
            link_text=$'\n\n'"📦 **[View Full Release](${release_url})**"
            max_length=$((2000 - ${#link_text}))

            # Split into lines and rebuild until we exceed the limit
            truncated_notes=""
            while IFS= read -r line; do
              test_notes="${truncated_notes}${line}"$'\n'
              if [ ${#test_notes} -gt $max_length ]; then
                break
              fi
              truncated_notes="$test_notes"
            done <<< "$release_notes_cleaned"

            # Add ellipsis on its own line if we truncated
            full_message="${truncated_notes}"$'\n'"...${link_text}"
          fi

          # Create JSON payload for Discord webhook
          # flags: 4 sets the SUPPRESS_EMBEDS flag to suppress embeds/link previews.
          # See: https://discord.com/developers/docs/resources/channel#create-message
          json_payload=$(jq -n \
            --arg content "$full_message" \
            '{content: $content, flags: 4}')

          # Send to Discord webhook
          curl -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$json_payload"

          echo "Release notes sent to Discord for version $version"

  deploy:
    needs: release-unity-plugin
    if: needs.release-unity-plugin.outputs.success == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy.yml
    with:
      version: ${{ needs.release-unity-plugin.outputs.version }}
    secrets: inherit

  # Cleanup job to remove build artifacts after the atomic publish + deploy.
  # Re-pointed at release-unity-plugin (was: publish-mcp-server, publish-unity-installer)
  # since those post-release publish jobs collapsed into release-unity-plugin.
  cleanup-artifacts:
    runs-on: ubuntu-latest
    needs: [release-unity-plugin, deploy]
    if: always()
    steps:
      - name: Delete Unity Package artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: unity-installer-package
          failOnError: false
        continue-on-error: true

      - name: Delete signed UPM package artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: signed-upm-package
          failOnError: false
        continue-on-error: true

      - name: Delete release notes artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: release-notes
          failOnError: false
        continue-on-error: true
